<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Velvet CMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>

  <body>
    <script>
      const hasToken =
        window.location.search.includes('invite_token') ||
        window.location.search.includes('recovery_token') ||
        window.location.hash.includes('invite_token') ||
        window.location.hash.includes('recovery_token');

      if (hasToken && !window.location.pathname.startsWith('/admin')) {
        window.location.href = '/admin/' + window.location.search + window.location.hash;
      }
    </script>

    <!-- Netlify Identity -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

    <!-- Decap CMS -->
    <script src="https://unpkg.com/decap-cms@3.1.11/dist/decap-cms.js"></script>
  </body>
</html>

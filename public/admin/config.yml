backend:
  name: git-gateway
  branch: main

media_folder: 'images'
public_folder: '/images'

collections:
  - name: 'layout'
    label: 'Layout'
    files:
      - file: 'public/content/layout.json'
        label: 'Site Layout'
        name: 'layout'
        fields:
          - label: 'Header'
            name: 'header'
            widget: 'object'
            fields:
              - { label: 'Brand', name: 'brand', widget: 'string' }
              - label: 'Navigation'
                name: 'navigation'
                widget: 'list'
                fields:
                  - { label: 'Label', name: 'label', widget: 'string' }
                  - { label: 'Path', name: 'path', widget: 'string' }

          - label: 'Footer'
            name: 'footer'
            widget: 'object'
            fields:
              - label: 'Brand'
                name: 'brand'
                widget: 'object'
                fields:
                  - { label: 'Name', name: 'name', widget: 'string' }
                  - { label: 'Description', name: 'description', widget: 'text' }
              - label: 'Navigation'
                name: 'navigation'
                widget: 'object'
                fields:
                  - { label: 'Title', name: 'title', widget: 'string' }
                  - label: 'Links'
                    name: 'links'
                    widget: 'list'
                    fields:
                      - { label: 'Label', name: 'label', widget: 'string' }
                      - { label: 'Path', name: 'path', widget: 'string' }
              - label: 'Newsletter'
                name: 'newsletter'
                widget: 'object'
                fields:
                  - { label: 'Title', name: 'title', widget: 'string' }
                  - { label: 'Placeholder', name: 'placeholder', widget: 'string' }
                  - { label: 'CTA', name: 'cta', widget: 'string' }
              - label: 'Bottom'
                name: 'bottom'
                widget: 'object'
                fields:
                  - { label: 'Copyright', name: 'copyright', widget: 'string' }
                  - label: 'Links'
                    name: 'links'
                    widget: 'object'
                    fields:
                      - { label: 'Instagram', name: 'instagram', widget: 'string' }
                      - { label: 'Contact', name: 'contact', widget: 'string' }

  - name: 'home'
    label: 'Home'
    files:
      - file: 'public/content/home.json'
        label: 'Home Page'
        name: 'home'
        fields:
          - label: 'Hero'
            name: 'hero'
            widget: 'object'
            fields:
              - { label: 'Eyebrow', name: 'eyebrow', widget: 'string' }
              - { label: 'Title', name: 'title', widget: 'string' }
              - { label: 'Description', name: 'description', widget: 'text' }
              - { label: 'CTA', name: 'cta', widget: 'string' }

  - name: 'pages'
    label: 'Pages'
    folder: 'public/content/pages'
    create: true
    extension: 'json'
    format: 'json'
    identifier_field: 'slug'
    slug: '{{slug}}'
    fields:
      - { label: 'Slug', name: 'slug', widget: 'string' }
      - { label: 'Title', name: 'title', widget: 'string' }
      - { label: 'Description', name: 'description', widget: 'text' }
      - label: 'Sections'
        name: 'sections'
        widget: 'list'
        types:
          - label: 'Rich Text'
            name: 'richText'
            widget: 'object'
            fields:
              - { label: 'ID', name: 'id', widget: 'string' }
              - { label: 'Title', name: 'title', widget: 'string' }
              - { label: 'Body', name: 'body', widget: 'text' }

          - label: 'Feature List'
            name: 'featureList'
            widget: 'object'
            fields:
              - { label: 'ID', name: 'id', widget: 'string' }
              - { label: 'Title', name: 'title', widget: 'string' }
              - label: 'Items'
                name: 'items'
                widget: 'list'
                field: { label: 'Item', name: 'item', widget: 'string' }

          - label: 'CTA'
            name: 'cta'
            widget: 'object'
            fields:
              - { label: 'ID', name: 'id', widget: 'string' }
              - { label: 'Title', name: 'title', widget: 'string' }
              - { label: 'Description', name: 'description', widget: 'text' }
              - { label: 'CTA Label', name: 'ctaLabel', widget: 'string' }
